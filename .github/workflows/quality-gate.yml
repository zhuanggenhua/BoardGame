name: Quality Gate

on:
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      CI: true
      AUDIT_RELEASE_MODE: '1'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Changed quality gate
        env:
          QUALITY_GATE_BASE: origin/${{ github.base_ref }}
        run: npm run quality:changed -- ci
