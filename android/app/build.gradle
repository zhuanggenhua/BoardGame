import java.util.Properties
import groovy.json.JsonSlurper

apply plugin: 'com.android.application'

def keystorePropertiesFile = rootProject.file('keystore.properties')
def keystoreProperties = new Properties()
def hasReleaseSigning = false
def requiresReleaseSigning = gradle.startParameter.taskNames.any { taskName -> taskName.toLowerCase().contains('release') }
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
    hasReleaseSigning = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword'].every { key ->
        keystoreProperties[key]
    }
}

android {
    namespace = "top.easyboardgame.app"
    compileSdk = rootProject.ext.compileSdkVersion
    signingConfigs {
        release {
            if (hasReleaseSigning) {
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
            }
        }
    }
    defaultConfig {
        applicationId "top.easyboardgame.app"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    buildTypes {
        release {
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}

if (requiresReleaseSigning && !hasReleaseSigning) {
    throw new GradleException('Missing Android release signing. Run npm run mobile:android:prepare-release or set ANDROID_KEYSTORE_PATH / ANDROID_KEYSTORE_BASE64.')
}

def capacitorConfigFile = file('src/main/assets/capacitor.config.json')
def capacitorConfig = capacitorConfigFile.exists() ? new JsonSlurper().parse(capacitorConfigFile) : [:]
def androidServerConfig = capacitorConfig.server instanceof Map ? capacitorConfig.server : [:]
def androidWebviewMode = androidServerConfig.url ? 'remote' : 'embedded'
def distAndroidBuildMetaFile = rootProject.file('../dist/android-build-meta.json')
def syncedAndroidBuildMetaFile = file('src/main/assets/public/android-build-meta.json')
def requiresSyncedWebAssets = androidWebviewMode == 'embedded' && gradle.startParameter.taskNames.any { taskName ->
    def lowerTaskName = taskName.toLowerCase()
    lowerTaskName.contains('assemble') || lowerTaskName.contains('bundle') || lowerTaskName.contains('install')
}
if (requiresSyncedWebAssets) {
    if (!distAndroidBuildMetaFile.exists()) {
        throw new GradleException('Missing dist/android-build-meta.json. Run npm run mobile:android:sync before building Android.')
    }
    if (!syncedAndroidBuildMetaFile.exists()) {
        throw new GradleException('Missing synced Android web assets. Run npm run mobile:android:sync before building Android.')
    }
    if (distAndroidBuildMetaFile.getText('UTF-8') != syncedAndroidBuildMetaFile.getText('UTF-8')) {
        throw new GradleException('Android web assets are out of sync with dist. Run npm run mobile:android:sync or npm run mobile:android:build:release.')
    }
}
